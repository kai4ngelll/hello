<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оценка лица → на почту</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #0a0a0f;
    color: #eee;
    padding: 16px;
    min-height: 100vh;
  }
  .container { max-width: 400px; margin: 0 auto; }
  
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 16px;
  }
  .header h1 { font-size: 18px; }
  .user { font-size: 13px; color: #888; }
  
  .card {
    background: #14141c;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  
  .score-big {
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .rank-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    background: #2a2a3a;
    margin-top: 4px;
  }
  
  .btn {
    background: #4a6cf7;
    border: none;
    color: #fff;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }
  .btn:hover { background: #5a7cff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  
  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
    background: #14141c;
    border-radius: 12px;
    padding: 4px 4px 4px 16px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .input-wrap input[type="file"] { display: none; }
  .input-wrap textarea {
    flex: 1;
    background: none;
    border: none;
    color: #fff;
    font-size: 14px;
    padding: 12px 0;
    resize: none;
    outline: none;
    font-family: inherit;
  }
  .input-wrap textarea::placeholder { color: #555; }
  .input-wrap button {
    background: #4a6cf7;
    border: none;
    color: #fff;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .input-wrap button:hover { background: #5a7cff; }
  .input-wrap button:disabled { opacity: 0.3; cursor: not-allowed; }
  
  .preview {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #14141c;
    border-radius: 12px;
    margin-bottom: 10px;
  }
  .preview.show { display: flex; }
  .preview img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
  .preview .info { flex: 1; font-size: 12px; color: #888; }
  .preview .remove {
    background: none;
    border: none;
    color: #666;
    font-size: 18px;
    cursor: pointer;
  }
  .preview .remove:hover { color: #ff4444; }
  
  .trait {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .trait:last-child { border-bottom: none; }
  .trait .name { color: #888; }
  .trait .val { font-weight: 600; }
  
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2a;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.06);
    z-index: 2000;
    display: none;
    max-width: 90%;
    text-align: center;
  }
  .toast.show { display: block; animation: fadeIn 0.3s ease; }
  .toast.success { border-color: #4caf50; background: #1a2a1a; }
  .toast.error { border-color: #ff4444; background: #2a1a1a; }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  
  .loader {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="container">
  
  <!-- ===== ХЕДЕР ===== -->
  <div class="header">
    <h1>👤 Оценка лица</h1>
    <div class="user" id="userDisplay">Гость</div>
  </div>
  
  <!-- ===== РЕЗУЛЬТАТ ===== -->
  <div id="resultCard" style="display:none;">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:start;">
        <div>
          <div style="font-size:13px; color:#666;">Общий балл</div>
          <div class="score-big" id="scoreDisplay">0.0</div>
          <div class="rank-badge" id="rankDisplay">—</div>
        </div>
        <div style="text-align:right; font-size:12px; color:#555;">
          <div id="emailStatus">📧 Отправка...</div>
          <div id="saveTime">—</div>
        </div>
      </div>
    </div>
    
    <div class="card">
      <div style="font-size:13px; color:#666; margin-bottom:8px;">Детали:</div>
      <div id="traitsList"></div>
    </div>
  </div>
  
  <!-- ===== ИНСТРУКЦИЯ ===== -->
  <div class="card" id="instructionCard">
    <p style="color:#888; font-size:14px; line-height:1.6;">
      📸 Прикрепи фото — оценка появится автоматически.<br>
      <span style="font-size:12px; color:#555;">Анфас, лицо целиком, хороший свет.</span>
    </p>
  </div>
  
  <!-- ===== ПРЕВЬЮ ===== -->
  <div class="preview" id="preview">
    <img id="previewImg" alt="">
    <div class="info" id="previewInfo">photo.jpg</div>
    <button class="remove" id="removePreview">✕</button>
  </div>
  
  <!-- ===== КОМПОЗЕР ===== -->
  <form id="composer">
    <div class="input-wrap">
      <textarea id="textInput" rows="1" placeholder="Напиши что-нибудь или прикрепи фото..."></textarea>
      <button type="button" id="attachBtn">📎</button>
      <button type="submit" id="sendBtn">➤</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </form>
  
</div>

<!-- ===== ТОАСТ ===== -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 1. EMAILJS — ТВОИ КЛЮЧИ (ВСТАВЛЕНЫ)
// ============================================================

const EMAILJS = {
  publicKey: 'pd8vRERvRc28_B3Xy',
  serviceID: 'service_10gniol',
  templateID: 'template_8g3x3mt'
};

// Инициализация
emailjs.init(EMAILJS.publicKey);

// ============================================================
// 2. TELEGRAM
// ============================================================

const tg = window.Telegram?.WebApp;
if (tg) tg.ready();

const user = tg?.initDataUnsafe?.user;

let userName = 'Гость';
let userUsername = 'unknown';
let userId = '—';

if (user) {
  userName = [user.first_name, user.last_name].filter(Boolean).join(' ') || user.username || 'Гость';
  userUsername = user.username || 'unknown';
  userId = user.id || '—';
  document.getElementById('userDisplay').textContent = userName;
}

// ============================================================
// 3. РАНГИ
// ============================================================

function getRank(score) {
  if (score >= 8.5) return '👑 trueadam';
  if (score >= 7.5) return '🔥 chad';
  if (score >= 6.5) return '⬆️ htn';
  if (score >= 5.5) return '➡️ mtn';
  if (score >= 3.5) return '⬇️ ltn';
  if (score >= 1.5) return '🔻 sub5';
  return '🔻 sub3';
}

// ============================================================
// 4. ОТПРАВКА НА ПОЧТУ С ФОТО
// ============================================================

function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 5000);
}

async function sendToEmail(data, photoDataUrl) {
  const statusEl = document.getElementById('emailStatus');
  statusEl.innerHTML = '📧 Отправка...';
  statusEl.style.color = '#64b5f6';

  try {
    // Обрезаем фото если слишком большое (для EmailJS)
    let photo = photoDataUrl || '';
    if (photo.length > 500000) {
      // Если фото слишком большое, пробуем сжать
      photo = await compressImage(photoDataUrl);
    }

    const templateParams = {
      user_name: data.userName || 'Гость',
      user_username: data.userUsername || 'unknown',
      user_id: data.userId || '—',
      overall: data.overall.toFixed(1),
      rank: data.rank,
      thirds: data.thirds.toFixed(1),
      jaw: data.jaw.toFixed(1),
      spacing: data.spacing.toFixed(1),
      nose: data.nose.toFixed(1),
      lips: data.lips.toFixed(1),
      skin: data.skin.toFixed(1),
      photo: photo
    };

    const response = await emailjs.send(
      EMAILJS.serviceID,
      EMAILJS.templateID,
      templateParams
    );

    statusEl.innerHTML = '✅ Отправлено!';
    statusEl.style.color = '#4caf50';
    showToast('✅ Результат с фото отправлен на почту!', 'success');
    console.log('✅ Email отправлен:', response);
    return true;
  } catch (error) {
    statusEl.innerHTML = '❌ Ошибка';
    statusEl.style.color = '#ff6b6b';
    showToast('❌ Ошибка: ' + (error.text || error.message || 'неизвестная'), 'error');
    console.error('❌ Ошибка EmailJS:', error);
    return false;
  }
}

// Сжатие фото если слишком большое
function compressImage(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      const maxSize = 800;
      if (width > maxSize || height > maxSize) {
        if (width > height) {
          height = height * (maxSize / width);
          width = maxSize;
        } else {
          width = width * (maxSize / height);
          height = maxSize;
        }
      }
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = dataUrl;
  });
}

// ============================================================
// 5. ПОКАЗ РЕЗУЛЬТАТА + ОТПРАВКА
// ============================================================

function showResult(score, traits, photoDataUrl) {
  const card = document.getElementById('resultCard');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const rankDisplay = document.getElementById('rankDisplay');
  const saveTime = document.getElementById('saveTime');
  const traitsList = document.getElementById('traitsList');
  const statusEl = document.getElementById('emailStatus');
  
  const rank = getRank(score);
  
  scoreDisplay.textContent = score.toFixed(1);
  rankDisplay.textContent = rank;
  rankDisplay.className = 'rank-badge';
  
  traitsList.innerHTML = traits.map(t => `
    <div class="trait">
      <span class="name">${t.name}</span>
      <span class="val">${t.score.toFixed(1)}</span>
    </div>
  `).join('');
  
  card.style.display = 'block';
  document.getElementById('instructionCard').style.display = 'none';
  saveTime.textContent = new Date().toLocaleTimeString();
  
  // Отправляем на почту
  const data = {
    userName: userName,
    userUsername: userUsername,
    userId: userId,
    overall: score,
    rank: rank,
    thirds: traits.find(t => t.key === 'thirds')?.score || 0,
    jaw: traits.find(t => t.key === 'jaw')?.score || 0,
    spacing: traits.find(t => t.key === 'spacing')?.score || 0,
    nose: traits.find(t => t.key === 'nose')?.score || 0,
    lips: traits.find(t => t.key === 'lips')?.score || 0,
    skin: traits.find(t => t.key === 'skin')?.score || 0
  };
  
  sendToEmail(data, photoDataUrl);
}

// ============================================================
// 6. РАБОТА С ФОТО
// ============================================================

const fileInput = document.getElementById('fileInput');
const attachBtn = document.getElementById('attachBtn');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const previewInfo = document.getElementById('previewInfo');
const removePreview = document.getElementById('removePreview');
const sendBtn = document.getElementById('sendBtn');
const textInput = document.getElementById('textInput');
const composer = document.getElementById('composer');

let pendingFiles = [];
let photoDataUrl = null;

attachBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const files = Array.from(fileInput.files);
  pendingFiles = [...pendingFiles, ...files];
  updatePreview();
  fileInput.value = '';
});

function updatePreview() {
  if (pendingFiles.length === 0) {
    preview.classList.remove('show');
    photoDataUrl = null;
    return;
  }
  const file = pendingFiles[0];
  const reader = new FileReader();
  reader.onload = (e) => {
    photoDataUrl = e.target.result;
    previewImg.src = photoDataUrl;
    previewInfo.textContent = `${pendingFiles.length} фото`;
    preview.classList.add('show');
  };
  reader.readAsDataURL(file);
}

removePreview.addEventListener('click', () => {
  pendingFiles = [];
  photoDataUrl = null;
  updatePreview();
});

// ============================================================
// 7. ОТПРАВКА ФОРМЫ — СИМУЛЯЦИЯ АНАЛИЗА
// ============================================================

composer.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (pendingFiles.length === 0) {
    showToast('⚠️ Прикрепи фото сначала!', 'error');
    return;
  }
  
  const text = textInput.value.trim();
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳';
  
  // Сохраняем фото до анализа
  const currentPhoto = photoDataUrl;
  
  // ===== СИМУЛЯЦИЯ АНАЛИЗА =====
  // В реальности тут будет face-api.js
  // Сейчас просто генерируем случайные данные для демонстрации
  
  setTimeout(() => {
    const score = 3 + Math.random() * 7;
    const traits = [
      { key: 'thirds', name: 'Пропорции трети лица', score: 3 + Math.random() * 7 },
      { key: 'jaw', name: 'Челюсть', score: 3 + Math.random() * 7 },
      { key: 'spacing', name: 'Посадка глаз', score: 3 + Math.random() * 7 },
      { key: 'nose', name: 'Нос', score: 3 + Math.random() * 7 },
      { key: 'lips', name: 'Губы', score: 3 + Math.random() * 7 },
      { key: 'skin', name: 'Кожа', score: 3 + Math.random() * 7 }
    ];
    
    showResult(score, traits, currentPhoto);
    
    // Очищаем после отправки
    pendingFiles = [];
    photoDataUrl = null;
    updatePreview();
    textInput.value = '';
    sendBtn.disabled = false;
    sendBtn.textContent = '➤';
  }, 1500);
});
</script>
</body>
    </html>
