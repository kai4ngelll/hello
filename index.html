<script>
// ============================================================
// 1. EMAILJS
// ============================================================

const EMAILJS = {
  publicKey: 'pd8vRERvRc28_B3Xy',
  serviceID: 'service_10gniol',
  templateID: 'template_8g3x3mt'
};

emailjs.init(EMAILJS.publicKey);

// ============================================================
// 2. TELEGRAM
// ============================================================

const tg = window.Telegram?.WebApp;
if (tg) tg.ready();

const user = tg?.initDataUnsafe?.user;

let userName = 'Гость';
let userUsername = 'unknown';
let userId = '—';

if (user) {
  userName = [user.first_name, user.last_name].filter(Boolean).join(' ') || user.username || 'Гость';
  userUsername = user.username || 'unknown';
  userId = user.id || '—';
  document.getElementById('userDisplay').textContent = userName;
}

// ============================================================
// 3. ЗАГРУЗКА МОДЕЛЕЙ FACE-API
// ============================================================

const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
let modelsReady = false;
let modelsError = false;

const statusEl = document.getElementById('modelStatus');

(async () => {
  try {
    statusEl.textContent = '⏳ Загрузка моделей...';
    statusEl.className = 'model-status loading';
    
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
    await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
    
    modelsReady = true;
    statusEl.textContent = '✅ Модели загружены! Отправляй фото.';
    statusEl.className = 'model-status ready';
  } catch (err) {
    modelsError = true;
    statusEl.textContent = '❌ Ошибка загрузки моделей: ' + err.message;
    statusEl.className = 'model-status error';
  }
})();

// ============================================================
// 4. РАНГИ
// ============================================================

function getRank(score) {
  if (score >= 8.5) return '👑 trueadam';
  if (score >= 7.5) return '🔥 chad';
  if (score >= 6.5) return '⬆️ htn';
  if (score >= 5.5) return '➡️ mtn';
  if (score >= 3.5) return '⬇️ ltn';
  if (score >= 1.5) return '🔻 sub5';
  return '🔻 sub3';
}

// ============================================================
// 5. ТАБЛИЦЫ ОЦЕНОК
// ============================================================

function scoreFromRange(value, min, max, tolerance) {
  if (value >= min && value <= max) return 10;
  const d = value < min ? (min - value) : (value - max);
  const s = 10 - (d / tolerance) * 10;
  return Math.max(0, Math.min(10, s));
}

// ============================================================
// 6. ОТПРАВКА НА ПОЧТУ
// ============================================================

function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 5000);
}

async function sendToEmail(data, photoDataUrl) {
  const statusEl = document.getElementById('emailStatus');
  statusEl.innerHTML = '📧 Отправка...';
  statusEl.style.color = '#64b5f6';

  try {
    let photo = photoDataUrl || '';
    if (photo.length > 500000) {
      photo = await compressImage(photoDataUrl);
    }

    const templateParams = {
      user_name: data.userName || 'Гость',
      user_username: data.userUsername || 'unknown',
      user_id: data.userId || '—',
      overall: data.overall.toFixed(1),
      rank: data.rank,
      thirds: data.thirds.toFixed(1),
      jaw: data.jaw.toFixed(1),
      spacing: data.spacing.toFixed(1),
      nose: data.nose.toFixed(1),
      lips: data.lips.toFixed(1),
      skin: data.skin.toFixed(1),
      photo: photo
    };

    await emailjs.send(
      EMAILJS.serviceID,
      EMAILJS.templateID,
      templateParams
    );

    statusEl.innerHTML = '✅ Отправлено!';
    statusEl.style.color = '#4caf50';
    showToast('✅ Результат с фото отправлен на почту!', 'success');
    return true;
  } catch (error) {
    statusEl.innerHTML = '❌ Ошибка';
    statusEl.style.color = '#ff6b6b';
    showToast('❌ Ошибка: ' + (error.text || error.message || 'неизвестная'), 'error');
    return false;
  }
}

function compressImage(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      const maxSize = 800;
      if (width > maxSize || height > maxSize) {
        if (width > height) {
          height = height * (maxSize / width);
          width = maxSize;
        } else {
          width = width * (maxSize / height);
          height = maxSize;
        }
      }
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.src = dataUrl;
  });
}

// ============================================================
// 7. ОЦЕНКА ЛИЦА (ПОЛНАЯ ВЕРСИЯ)
// ============================================================

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function avgY(points) { return points.reduce((s,p) => s+p.y, 0) / points.length; }

function estimateSharpness(img, box) {
  const c = document.createElement('canvas');
  const w = 120, h = 120;
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, box.x, box.y, box.width, box.height, 0, 0, w, h);
  const data = ctx.getImageData(0, 0, w, h).data;
  const gray = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const r = data[i*4], g = data[i*4+1], b = data[i*4+2];
    gray[i] = 0.299*r + 0.587*g + 0.114*b;
  }
  let sum = 0, sumSq = 0, n = 0;
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const idx = y*w + x;
      const lap = gray[idx-1] + gray[idx+1] + gray[idx-w] + gray[idx+w] - 4*gray[idx];
      sum += lap; sumSq += lap*lap; n++;
    }
  }
  const mean = sum/n;
  return Math.sqrt(sumSq/n - mean*mean);
}

function estimateBrightness(img, box) {
  const c = document.createElement('canvas');
  const w = 60, h = 60;
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, box.x, box.y, box.width, box.height, 0, 0, w, h);
  const data = ctx.getImageData(0, 0, w, h).data;
  let sum = 0;
  for (let i = 0; i < w*h; i++) {
    sum += 0.299*data[i*4] + 0.587*data[i*4+1] + 0.114*data[i*4+2];
  }
  return sum / (w*h);
}

function checkFringeOcclusion(lm) {
  const browY = avgY(lm.slice(17, 27));
  const eyeY = avgY(lm.slice(36, 48));
  const chinY = lm[8].y;
  const faceHeightRef = Math.abs(chinY - browY) || 1;
  const browEyeGap = Math.abs(eyeY - browY) / faceHeightRef;
  return browEyeGap < 0.04;
}

function estimateSkinScore(img, box, lm) {
  const patches = [
    { cx: (lm[2].x*0.4 + lm[3].x*0.6), cy: (lm[2].y*0.4 + lm[3].y*0.6) },
    { cx: (lm[14].x*0.4 + lm[13].x*0.6), cy: (lm[14].y*0.4 + lm[13].y*0.6) },
  ];
  const c = document.createElement('canvas');
  const size = 32;
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  let totalVar = 0, samples = 0;
  patches.forEach(p => {
    const s = box.width * 0.14;
    if (s < 4) return;
    ctx.clearRect(0,0,size,size);
    ctx.drawImage(img, p.cx - s/2, p.cy - s/2, s, s, 0, 0, size, size);
    const data = ctx.getImageData(0,0,size,size).data;
    const gray = [];
    for (let i=0;i<size*size;i++) gray.push(0.299*data[i*4]+0.587*data[i*4+1]+0.114*data[i*4+2]);
    const mean = gray.reduce((a,b)=>a+b,0)/gray.length;
    const variance = gray.reduce((a,b)=>a+(b-mean)*(b-mean),0)/gray.length;
    totalVar += variance; samples++;
  });
  if (samples === 0) return 6;
  const avgVar = totalVar / samples;
  return scoreFromRange(avgVar, 0, 120, 350);
}

function scoreFace(lm, box, img, gender) {
  const jawL = lm[0], jawR = lm[16];
  const jawAngL = lm[4], jawAngR = lm[12];
  const chin = lm[8];
  const noseBridge = lm[27], noseBase = lm[33];
  const noseL = lm[31], noseR = lm[35];
  const eyeLOuter = lm[36], eyeLInner = lm[39], eyeROuter = lm[45], eyeRInner = lm[42];
  const mouthL = lm[48], mouthR = lm[54], mouthTop = lm[51], mouthBottom = lm[57];

  const faceWidth = dist(jawL, jawR);

  // Симметрия
  const midX = (jawL.x + jawR.x) / 2;
  const pairs = [
    [0,16], [1,15], [2,14], [3,13], [4,12], [5,11], [6,10], [7,9],
    [36,45], [39,42], [31,35], [48,54]
  ];
  let symDiff = 0;
  pairs.forEach(([a,b]) => {
    const da = Math.abs(lm[a].x - midX);
    const db = Math.abs(lm[b].x - midX);
    symDiff += Math.abs(da - db);
  });
  symDiff = symDiff / pairs.length / (faceWidth || 1);
  const symmetryScore = scoreFromRange(symDiff, 0, 0.04, 0.10) + 1.5;

  // Пропорции третей
  const middleThird = dist(noseBridge, noseBase);
  const lowerThird = dist(noseBase, chin);
  const thirdsRatio = lowerThird / (middleThird || 1);
  const thirdsScore = scoreFromRange(thirdsRatio, 0.92, 1.15, 0.35) + 1.5;

  // Челюсть
  const jawWidth = dist(jawAngL, jawAngR);
  const jawRatio = jawWidth / (faceWidth || 1);
  const jawTarget = gender === 'm' ? [0.74, 0.85] : [0.62, 0.74];
  const jawScore = scoreFromRange(jawRatio, jawTarget[0], jawTarget[1], 0.16) + 1.5;

  // Посадка глаз
  const interocular = dist(eyeLInner, eyeRInner);
  const eyeWidth = (dist(eyeLOuter, eyeLInner) + dist(eyeROuter, eyeRInner)) / 2;
  const spacingRatio = interocular / (eyeWidth || 1);
  const spacingScore = scoreFromRange(spacingRatio, 0.85, 1.15, 0.6) + 1.5;

  // Нос
  const noseWidth = dist(noseL, noseR);
  const noseRatio = noseWidth / (faceWidth || 1);
  const noseScore = scoreFromRange(noseRatio, 0.19, 0.26, 0.12) + 1.5;

  // Губы
  const mouthWidth = dist(mouthL, mouthR);
  const mouthHeight = dist(mouthTop, mouthBottom);
  const lipRatio = mouthHeight / (mouthWidth || 1);
  const lipScore = scoreFromRange(lipRatio, 0.24, 0.4, 0.2) + 1.5;

  // Кожа
  const skinScore = estimateSkinScore(img, box, lm) + 1.5;

  const traits = [
    { key: 'symmetry', name: 'Симметрия лица', score: Math.min(10, symmetryScore) },
    { key: 'thirds', name: 'Пропорции трети лица', score: Math.min(10, thirdsScore) },
    { key: 'jaw', name: gender === 'm' ? 'Выраженность челюсти' : 'Форма нижней трети', score: Math.min(10, jawScore) },
    { key: 'spacing', name: 'Посадка глаз', score: Math.min(10, spacingScore) },
    { key: 'nose', name: 'Пропорции носа', score: Math.min(10, noseScore) },
    { key: 'lips', name: 'Пропорции губ', score: Math.min(10, lipScore) },
    { key: 'skin', name: 'Чистота кожи', score: Math.min(10, skinScore) }
  ];

  const weights = { symmetry: 0.20, thirds: 0.14, jaw: 0.15, spacing: 0.12, nose: 0.12, lips: 0.12, skin: 0.15 };
  let overall = 0, wsum = 0;
  traits.forEach(t => { overall += t.score * weights[t.key]; wsum += weights[t.key]; });
  overall = overall / wsum;

  return { overall, traits };
}

async function runQualityChecks(img, selectedGender) {
  if (img.naturalWidth < 200 || img.naturalHeight < 200) {
    return { ok: false, reason: 'Слишком низкое разрешение. Пришлите фото хотя бы 400×400.' };
  }

  const detections = await faceapi
    .detectAllFaces(img, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.35 }))
    .withFaceLandmarks()
    .withAgeAndGender();

  if (!detections || detections.length === 0) {
    return { ok: false, reason: 'На фото не найдено лицо. Нужен чёткий анфас-портрет.' };
  }
  if (detections.length > 1) {
    return { ok: false, reason: 'На фото больше одного лица. Пришлите фото, где только вы.' };
  }

  const det = detections[0];
  const box = det.detection.box;
  const landmarks = det.landmarks.positions;

  if (box.height < img.naturalHeight * 0.15) {
    return { ok: false, reason: 'Лицо слишком маленькое в кадре. Снимите ближе.' };
  }

  const blur = estimateSharpness(img, box);
  if (blur < 7) {
    return { ok: false, reason: 'Фото размытое. Пришлите чёткое фото.' };
  }

  const brightness = estimateBrightness(img, box);
  if (brightness < 30) {
    return { ok: false, reason: 'Слишком тёмное фото. Снимите при нормальном свете.' };
  }
  if (brightness > 240) {
    return { ok: false, reason: 'Фото пересвечено. Уберите вспышку.' };
  }

  const fringeIssue = checkFringeOcclusion(landmarks);
  if (fringeIssue) {
    return { ok: false, reason: 'Похоже, чёлка или волосы закрывают брови/глаза.' };
  }

  return { ok: true, landmarks, box };
}

// ============================================================
// 8. ПОКАЗ РЕЗУЛЬТАТА
// ============================================================

function showResult(score, traits, photoDataUrl, gender) {
  const card = document.getElementById('resultCard');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const rankDisplay = document.getElementById('rankDisplay');
  const saveTime = document.getElementById('saveTime');
  const traitsList = document.getElementById('traitsList');
  
  const rank = getRank(score);
  
  scoreDisplay.textContent = score.toFixed(1);
  rankDisplay.textContent = rank;
  rankDisplay.className = 'rank-badge';
  
  traitsList.innerHTML = traits.map(t => `
    <div class="trait">
      <span class="name">${t.name}</span>
      <span class="val">${t.score.toFixed(1)}</span>
    </div>
  `).join('');
  
  card.style.display = 'block';
  document.getElementById('instructionCard').style.display = 'none';
  saveTime.textContent = new Date().toLocaleTimeString();
  
  const data = {
    userName: userName,
    userUsername: userUsername,
    userId: userId,
    overall: score,
    rank: rank,
    thirds: traits.find(t => t.key === 'thirds')?.score || 0,
    jaw: traits.find(t => t.key === 'jaw')?.score || 0,
    spacing: traits.find(t => t.key === 'spacing')?.score || 0,
    nose: traits.find(t => t.key === 'nose')?.score || 0,
    lips: traits.find(t => t.key === 'lips')?.score || 0,
    skin: traits.find(t => t.key === 'skin')?.score || 0
  };
  
  sendToEmail(data, photoDataUrl);
}

// ============================================================
// 9. РАБОТА С ФОТО
// ============================================================

const fileInput = document.getElementById('fileInput');
const attachBtn = document.getElementById('attachBtn');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const previewInfo = document.getElementById('previewInfo');
const removePreview = document.getElementById('removePreview');
const sendBtn = document.getElementById('sendBtn');
const textInput = document.getElementById('textInput');
const composer = document.getElementById('composer');

let pendingFiles = [];
let photoDataUrl = null;

attachBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const files = Array.from(fileInput.files);
  pendingFiles = [...pendingFiles, ...files];
  updatePreview();
  fileInput.value = '';
});

function updatePreview() {
  if (pendingFiles.length === 0) {
    preview.classList.remove('show');
    photoDataUrl = null;
    return;
  }
  const file = pendingFiles[0];
  const reader = new FileReader();
  reader.onload = (e) => {
    photoDataUrl = e.target.result;
    previewImg.src = photoDataUrl;
    previewInfo.textContent = `${pendingFiles.length} фото`;
    preview.classList.add('show');
  };
  reader.readAsDataURL(file);
}

removePreview.addEventListener('click', () => {
  pendingFiles = [];
  photoDataUrl = null;
  updatePreview();
});

// ============================================================
// 10. ОТПРАВКА — ПОЛНАЯ ВЕРСИЯ
// ============================================================

let gender = 'm';

document.querySelectorAll('.gender-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    gender = btn.dataset.g;
    document.querySelectorAll('.gender-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelector('.gender-toggle .slider').style.transform = gender === 'm' ? 'translateX(100%)' : 'translateX(0)';
  });
});

composer.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (pendingFiles.length === 0) {
    showToast('⚠️ Прикрепи фото сначала!', 'error');
    return;
  }
  
  if (!modelsReady) {
    if (modelsError) {
      showToast('❌ Модели не загрузились. Обнови страницу.', 'error');
    } else {
      showToast('⏳ Модели ещё загружаются. Подожди...', 'error');
    }
    return;
  }
  
  const text = textInput.value.trim();
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳';
  
  const currentPhoto = photoDataUrl;
  
  try {
    const img = await loadImageEl(currentPhoto);
    const quality = await runQualityChecks(img, gender);
    
    if (!quality.ok) {
      showToast('❌ ' + quality.reason, 'error');
      sendBtn.disabled = false;
      sendBtn.textContent = '➤';
      return;
    }
    
    const result = scoreFace(quality.landmarks, quality.box, img, gender);
    showResult(result.overall, result.traits, currentPhoto, gender);
    
    pendingFiles = [];
    photoDataUrl = null;
    updatePreview();
    textInput.value = '';
    sendBtn.disabled = false;
    sendBtn.textContent = '➤';
    
  } catch (err) {
    showToast('❌ Ошибка обработки фото: ' + err.message, 'error');
    sendBtn.disabled = false;
    sendBtn.textContent = '➤';
  }
});

function loadImageEl(dataUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('файл повреждён'));
    img.src = dataUrl;
  });
}
</script>
